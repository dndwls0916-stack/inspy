<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영감 왜불러 — Hey, Inspy!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f7ff;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 32px;
      padding: 60px 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px -10px rgba(49,130,246,0.12);
      text-align: center;
    }
    .icon { font-size: 72px; margin-bottom: 24px; }
    h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
    .sub { font-size: 18px; color: #3182f6; font-weight: 600; letter-spacing: 3px; margin-bottom: 32px; }
    .desc { font-size: 16px; color: #475569; line-height: 1.8; margin-bottom: 40px; }
    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
      text-align: left;
    }
    .feature {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
    }
    .badge {
      display: inline-block;
      background: #3182f6;
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 28px;
      border-radius: 100px;
      letter-spacing: 1px;
    }
    .footer { margin-top: 32px; font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎣</div>
    <h1>영감 왜불러</h1>
    <div class="sub">Hey, Inspy!</div>
    <p class="desc">
      순간 떠올랐다가 사라지는 영감,<br>
      이제 놓치지 마세요.
    </p>
    <div class="features">
      <div class="feature">📝 빠른 메모 — 텍스트와 이미지로 즉시 저장</div>
      <div class="feature">📌 핀 고정 — 중요한 영감은 상단에 고정</div>
      <div class="feature">💡 영감 소환 — 푸시 알림으로 다시 꺼내드림</div>
      <div class="feature">🎁 포인트 리워드 — 기록할수록 토스 포인트</div>
    </div>
    <div class="badge">토스 미니앱에서 만나보세요</div>
  </div>
  <div class="footer">© 2026 inspy · 앱인토스 미니앱</div>
</body>
</html>
